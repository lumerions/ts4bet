{% extends "main.html" %}

{% block title %}Dice - AH Gambling{% endblock %}

{% block content %}
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    .panel-card {
        background: linear-gradient(180deg, #1e2140, #15162b);
        border-radius: 14px;
        padding: 16px;
        border: 1px solid #2e2f55;
    }

    main {
        flex: 1;
        display: flex;
        justify-content: center;
        padding: 3rem 1rem;
        width: 100%; 
    }

    .game-container {
        display: flex;
        flex-direction: row; 
        align-items: flex-start; 
        gap: 24px;
        width: 100%;
        max-width: 1100px;
        margin: 0 auto; 
        padding: 20px;
    }

    .card {
        background: #111;
        border: 1px solid #333;
        border-radius: 10px;
        padding: 2.5rem 1.5rem;
        text-align: center;
        max-width: 700px;
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .dice-slider-container {
        position: relative;
        width: 100%;
        height: 80px;
        background: #222;
        border-radius: 50px;
        margin: 40px 0;
        display: flex;
        align-items: center;
        padding: 0 24px;
        border: 4px solid #333;
    }

    #diceSlider {
        -webkit-appearance: none;
        width: 100%;
        height: 12px;
        border-radius: 5px;
        outline: none;
        cursor: pointer;
    }

    #diceSlider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 44px;
        height: 44px;
        background: #fff;
        border: 4px solid #7c3aed;
        border-radius: 12px;
        cursor: grab;
        box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    #diceSlider::-webkit-slider-thumb:active { cursor: grabbing; }

    .slider-labels {
        display: flex;
        justify-content: space-between;
        color: #888;
        font-weight: bold;
        padding: 0 10px;
        font-family: monospace;
    }

    .result-display {
        font-size: 4rem;
        font-weight: 800;
        color: #fff;
        margin-bottom: 10px;
        text-shadow: 0 0 20px rgba(124, 58, 237, 0.3);
    }

    .side-panel {
        width: 300px;
        flex-shrink: 0;
        position: sticky; 
        top: 20px;
        z-index: 100;           
        background-color: #000;
        height: fit-content;   
    }

    button#rollDiceBtn {
        padding: 1rem;
        background: #7c3aed;
        border: none;
        color: #fff;
        font-weight: bold;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1.1rem;
        width: 100%;
        margin-top: 15px;
        transition: all 0.2s;
    }

    button#rollDiceBtn:hover { background: #6d28d9; }
    button#rollDiceBtn:active { transform: scale(0.98); }

    .stat-row {
        display: flex;
        justify-content: space-between;
        margin: 5px 0;
        font-size: 0.9rem;
        color: #c7c9ff;
    }

    .toggle-container {
        display: flex;
        background: #2a3448;
        border-radius: 8px;
        padding: 4px;
        margin-top: 15px;
        border: 1px solid #7c3aed;
    }

    .toggle-btn {
        flex: 1;
        padding: 10px;
        border: none;
        background: transparent;
        color: #cbd5f5;
        cursor: pointer;
        font-size: 0.85rem;
        font-weight: 600;
        border-radius: 6px;
        transition: all 0.2s;
    }

    .toggle-btn.active {
        background: #7c3aed;
        color: #fff;
    }

    @media (max-width: 900px) {
        .game-container { flex-direction: column; align-items: center; }
        .side-panel { width: 100%; max-width: 520px; position: relative; top: 0; }
        .card { width: 100%; margin-top: 10px; }
    }
</style>

<main>
    <div class="game-container">
        <div class="side-panel">
            {% include "sidepanel.html" %}
            <div class="toggle-container">
                <button class="toggle-btn active" id="btnOver">Roll Over</button>
                <button class="toggle-btn" id="btnUnder">Roll Under</button>
            </div>
            <div class="panel-card">
                <div class="stat-row"><span>Win Chance:</span><span id="winChance">50.00%</span></div>
                <div class="stat-row"><span>Multiplier:</span><span id="diceMultiplier">1.98x</span></div>
            </div>
            <button id="rollDiceBtn">Roll Dice</button>
        </div>

        <div class="card">
            <div id="diceResult" class="result-display">--</div>
            <div class="dice-slider-container">
                <input type="range" min="2" max="98" value="50" id="diceSlider">
            </div>
            <div class="slider-labels"><span>0</span><span>25</span><span>50</span><span>75</span><span>100</span></div>
            <div class="panel-card" style="background: rgba(0,0,0,0.2);">
                <p style="color:#888;font-size:0.9rem;">
                    Roll <span id="modeLabel" style="color:#7c3aed;font-weight:bold;">over</span> 
                    <span id="rollTarget" style="color:#fff;font-weight:bold;">50</span> to win
                </p>
            </div>
        </div>
    </div>
</main>
    <script type="module" src="./javascript/dice.js"></script>
{% endblock %}
